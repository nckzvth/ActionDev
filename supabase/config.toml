project_id = "actiondev"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://nckzvth.github.io/ActionDev/"
additional_redirect_urls = ["https://nckzvth.github.io/ActionDev/", "http://localhost:5173/", "http://localhost:5173/ActionDev/", "http://127.0.0.1:5173/ActionDev/"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m"
otp_length = 8

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
